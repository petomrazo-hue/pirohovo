<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Pirohovo</title>
  <meta name="description" content="Pirohovo je dočasne mimo prevádzky.">
  <meta name="theme-color" content="#080B12">
  <link rel="icon" href="/favicon.ico?v=2" sizes="any">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --text: #E9EFF7;
      --muted: #8C99AC;
      --grad: linear-gradient(120deg, #38BDF8 0%, #818CF8 48%, #22D3EE 100%);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(120% 90% at 50% 28%, #1b2440 0%, #0b1020 62%, #070a16 100%);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      padding: 1.5rem;
      -webkit-font-smoothing: antialiased;
    }
    main {
      width: 100%;
      max-width: 460px;
      text-align: center;
    }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: clamp(1.9rem, 6vw, 2.6rem);
      line-height: 1.12;
      letter-spacing: -.01em;
      background: var(--grad);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
    }
    .clock {
      margin-top: 1.4rem;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: clamp(1.1rem, 3.4vw, 1.4rem);
      letter-spacing: .06em;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .snow {
      display: inline-flex;
      margin-top: 2.6rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 1.3rem;
      line-height: 1;
      opacity: .55;
      transition: opacity .25s ease, transform .25s ease, color .25s ease;
    }
    .snow:hover {
      opacity: 1;
      color: #38BDF8;
      transform: rotate(25deg) scale(1.1);
    }
    @media (prefers-reduced-motion: no-preference) {
      main { animation: fade-in .6s ease both; }
      @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    }
  </style>
</head>
<body>
  <main>
    <h1>Stránka sa pripravuje.</h1>
    <div class="clock" id="clock" aria-label="Aktuálny čas">00:00:00</div>
    <a class="snow" href="https://mrazosoft.sk" target="_blank" rel="noopener" aria-label="mrazosoft.sk">❄</a>
  </main>

  <script>
    function tick() {
      var d = new Date();
      var p = function (n) { return String(n).padStart(2, '0'); };
      document.getElementById('clock').textContent = p(d.getHours()) + ':' + p(d.getMinutes()) + ':' + p(d.getSeconds());
    }
    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
