<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Pirohovo</title>
  <meta name="description" content="Pirohovo je dočasne mimo prevádzky.">
  <meta name="theme-color" content="#161616">
  <link rel="icon" href="/favicon.ico?v=2" sizes="any">

  <style>
    @font-face { font-family:'Inter'; font-style:normal; font-weight:400 700; font-display:swap; src:url('fonts/inter-400-latin-ext.woff2') format('woff2'); unicode-range:U+0100-02BA,U+02BD-02C5,U+02C7-02CC,U+02CE-02D7,U+02DD-02FF,U+0304,U+0308,U+0329,U+1D00-1DBF,U+1E00-1E9F,U+1EF2-1EFF,U+2020,U+20A0-20AB,U+20AD-20C0,U+2113,U+2C60-2C7F,U+A720-A7FF; }
    @font-face { font-family:'Inter'; font-style:normal; font-weight:400 700; font-display:swap; src:url('fonts/inter-400-latin.woff2') format('woff2'); unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD; }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        repeating-linear-gradient(135deg, #1a1a1a 0 28px, #161616 28px 56px),
        #161616;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: #f2f2f2;
      padding: 1.5rem;
    }

    .card {
      text-align: center;
      max-width: 420px;
      width: 100%;
      padding: clamp(2.2rem, 6vw, 3rem) clamp(1.6rem, 5vw, 2rem);
      background: rgba(10,10,10,.72);
      border: 1px solid rgba(255,200,0,.25);
      border-radius: 8px;
      backdrop-filter: blur(4px);
    }

    .icon { width: 64px; height: 64px; margin: 0 auto 1.4rem; color: #ffc400; }

    h1 { font-size: clamp(1.3rem, 4vw, 1.6rem); font-weight: 700; margin-bottom: .6rem; letter-spacing: .01em; }

    p { color: rgba(242,242,242,.6); font-size: .95rem; line-height: 1.6; }

    .tape {
      margin-top: 1.8rem;
      font-size: .7rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: #ffc400;
    }

    @media (prefers-reduced-motion: no-preference) {
      .card { animation: fade-in .5s ease both; }
      @keyframes fade-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    }
  </style>
</head>
<body>
  <div class="card">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
      <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
    </svg>
    <h1>Stránka sa pripravuje</h1>
    <p>Pirohovo.eu je momentálne mimo prevádzky.<br>Pracujeme na tom.</p>
    <div class="tape">⚠ Under construction ⚠</div>
  </div>
</body>
</html>
