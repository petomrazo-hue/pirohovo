<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Pirohovo</title>
  <meta name="description" content="Pirohovo je dočasne mimo prevádzky.">
  <meta name="theme-color" content="#0b0a07">
  <link rel="icon" href="/favicon.ico?v=2" sizes="any">

  <style>
    @font-face { font-family:'Amatic SC'; font-style:normal; font-weight:700; font-display:swap; src:url('fonts/amaticsc-700-latin-ext.woff2') format('woff2'); unicode-range:U+0100-02BA,U+02BD-02C5,U+02C7-02CC,U+02CE-02D7,U+02DD-02FF,U+0304,U+0308,U+0329,U+1D00-1DBF,U+1E00-1E9F,U+1EF2-1EFF,U+2020,U+20A0-20AB,U+20AD-20C0,U+2113,U+2C60-2C7F,U+A720-A7FF; }
    @font-face { font-family:'Amatic SC'; font-style:normal; font-weight:700; font-display:swap; src:url('fonts/amaticsc-700-latin.woff2') format('woff2'); unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD; }
    @font-face { font-family:'Inter'; font-style:normal; font-weight:400 700; font-display:swap; src:url('fonts/inter-400-latin-ext.woff2') format('woff2'); unicode-range:U+0100-02BA,U+02BD-02C5,U+02C7-02CC,U+02CE-02D7,U+02DD-02FF,U+0304,U+0308,U+0329,U+1D00-1DBF,U+1E00-1E9F,U+1EF2-1EFF,U+2020,U+20A0-20AB,U+20AD-20C0,U+2113,U+2C60-2C7F,U+A720-A7FF; }
    @font-face { font-family:'Inter'; font-style:normal; font-weight:400 700; font-display:swap; src:url('fonts/inter-400-latin.woff2') format('woff2'); unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD; }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #0b0a07;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: #f5f0e8;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: #0b0a07 url('images/og-image.jpg') center 38% / cover no-repeat;
      filter: saturate(0.55) brightness(0.32);
      transform: scale(1.06);
      animation: drift 50s ease-in-out infinite alternate;
    }

    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at center, rgba(11,10,7,.45) 0%, rgba(11,10,7,.88) 70%, #0b0a07 100%);
    }

    @keyframes drift {
      from { transform: scale(1.06) translate3d(0,0,0); }
      to   { transform: scale(1.12) translate3d(-1%, -1%, 0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .bg { animation: none; }
    }

    .stage {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 8vh 1.5rem;
      max-width: 30rem;
    }

    .wordmark {
      width: clamp(150px, 28vw, 230px);
      height: auto;
      opacity: .92;
      margin-bottom: clamp(1.2rem, 4vh, 2.4rem);
    }

    .sign {
      font-family: 'Amatic SC', cursive;
      font-weight: 700;
      font-size: clamp(2.6rem, 9vw, 4.2rem);
      line-height: 1;
      letter-spacing: .01em;
      color: #f5f0e8;
    }

    .hr {
      width: 56px;
      height: 1px;
      background: rgba(196,149,32,.55);
      margin: clamp(1.1rem, 3vh, 1.6rem) 0;
    }

    .note {
      font-size: clamp(.92rem, 2.4vw, 1.05rem);
      line-height: 1.6;
      color: rgba(245,240,232,.6);
    }

    .mark {
      position: fixed;
      bottom: 1.4rem;
      left: 0;
      right: 0;
      z-index: 1;
      text-align: center;
      font-size: .72rem;
      letter-spacing: .04em;
      color: rgba(245,240,232,.28);
    }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>

  <main class="stage">
    <img class="wordmark" src="images/wordmark.png" alt="Pirohovo" width="753" height="267">
    <h1 class="sign">Dnes nevaríme.</h1>
    <div class="hr" aria-hidden="true"></div>
    <p class="note">Stánok je dočasne mimo prevádzky.<br>Ďakujeme, že ste si naňho spomenuli.</p>
  </main>

  <p class="mark">© Pirohovo</p>
</body>
</html>
