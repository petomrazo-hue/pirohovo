<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Pirohovo</title>
  <meta name="description" content="Pirohovo je dočasne mimo prevádzky.">
  <meta name="theme-color" content="#080B12">
  <link rel="icon" href="/favicon.ico?v=2" sizes="any">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --text: #E9EFF7;
      --muted: #8C99AC;
      --grad: linear-gradient(120deg, #38BDF8 0%, #818CF8 48%, #22D3EE 100%);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(120% 90% at 50% 28%, #1b2440 0%, #0b1020 62%, #070a16 100%);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      padding: 1.5rem;
      -webkit-font-smoothing: antialiased;
    }
    main {
      width: 100%;
      max-width: 460px;
      text-align: center;
    }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: clamp(1.9rem, 6vw, 2.6rem);
      line-height: 1.12;
      letter-spacing: -.01em;
      background: var(--grad);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
    }
    .clock {
      margin-top: 1.4rem;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: clamp(1.1rem, 3.4vw, 1.4rem);
      letter-spacing: .06em;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .snow-wrap { width: clamp(110px, 20vw, 170px); margin: 2.6rem auto 0; }
    .snow {
      display: block;
      width: 100%;
      height: auto;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      filter: drop-shadow(0 0 40px rgba(56, 189, 248, 0.55));
      transition: filter .2s ease;
      animation: flakeSpin 22s linear infinite;
    }
    .snow:hover, .snow:focus-visible {
      filter: drop-shadow(0 0 60px rgba(56, 189, 248, 1));
      animation-duration: 3s;
    }
    .snow svg { display: block; width: 100%; height: auto; }
    @keyframes flakeSpin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { .snow { animation: none; } }
    @media (prefers-reduced-motion: no-preference) {
      main { animation: fade-in .6s ease both; }
      @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    }
  </style>
</head>
<body>
  <main>
    <h1>Stránka sa pripravuje.</h1>
    <div class="clock" id="clock" aria-label="Aktuálny čas">00:00:00</div>
    <div class="snow-wrap">
      <a class="snow" href="https://mrazosoft.sk" target="_blank" rel="noopener" aria-label="mrazosoft.sk">
        <svg viewBox="0 0 64 64" aria-hidden="true">
          <defs><linearGradient id="frost" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#38BDF8" /><stop offset="0.5" stop-color="#818CF8" /><stop offset="1" stop-color="#22D3EE" /></linearGradient></defs>
          <g fill="none" stroke="url(#frost)" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round">
            <g id="flakeArm"><line x1="32" y1="32" x2="32" y2="7" /><line x1="32" y1="14" x2="26" y2="8" /><line x1="32" y1="14" x2="38" y2="8" /><line x1="32" y1="22" x2="27.5" y2="17.5" /><line x1="32" y1="22" x2="36.5" y2="17.5" /></g>
            <use href="#flakeArm" transform="rotate(60 32 32)" /><use href="#flakeArm" transform="rotate(120 32 32)" /><use href="#flakeArm" transform="rotate(180 32 32)" /><use href="#flakeArm" transform="rotate(240 32 32)" /><use href="#flakeArm" transform="rotate(300 32 32)" />
            <circle cx="32" cy="32" r="2.4" fill="url(#frost)" stroke="none" />
          </g>
        </svg>
      </a>
    </div>
  </main>

  <script>
    function tick() {
      var d = new Date();
      var p = function (n) { return String(n).padStart(2, '0'); };
      document.getElementById('clock').textContent = p(d.getHours()) + ':' + p(d.getMinutes()) + ':' + p(d.getSeconds());
    }
    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
