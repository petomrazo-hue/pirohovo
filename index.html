<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Pirohovo</title>
  <meta name="description" content="Pirohovo je dočasne mimo prevádzky.">
  <meta name="theme-color" content="#080B12">
  <link rel="icon" href="/favicon.ico?v=2" sizes="any">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #080B12;
      --text: #E9EFF7;
      --muted: #8C99AC;
      --border: rgba(140,165,200,.14);
      --grad: linear-gradient(120deg, #38BDF8 0%, #818CF8 48%, #22D3EE 100%);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(120% 90% at 50% 28%, #1b2440 0%, #0b1020 62%, #070a16 100%);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      padding: 1.5rem;
      -webkit-font-smoothing: antialiased;
    }
    main {
      width: 100%;
      max-width: 460px;
      text-align: center;
    }
    .eyebrow {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: .72rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.6rem;
    }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: clamp(1.9rem, 6vw, 2.6rem);
      line-height: 1.12;
      letter-spacing: -.01em;
      margin-bottom: .9rem;
    }
    .grad-text {
      background: var(--grad);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
    }
    p.note {
      color: var(--muted);
      font-size: .98rem;
      line-height: 1.6;
      max-width: 360px;
      margin: 0 auto;
    }
    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin: 2.4rem 0 1.8rem;
    }
    .credit {
      font-size: .82rem;
      color: var(--muted);
    }
    .credit a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-left: 6px;
      text-decoration: none;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      letter-spacing: .02em;
      color: var(--text);
      transition: opacity .2s ease;
    }
    .credit a .arr { display: inline-block; transition: transform .2s ease; }
    .credit a:hover .arr { transform: translateX(3px); }
    .credit a:hover { opacity: .85; }
    @media (prefers-reduced-motion: no-preference) {
      main { animation: fade-in .6s ease both; }
      @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">Pirohovo</div>
    <h1>Stránka sa<br><span class="grad-text">pripravuje.</span></h1>
    <p class="note">Pirohovo.eu je momentálne mimo prevádzky. Ďakujeme za pochopenie.</p>
    <div class="divider"></div>
    <p class="credit">Web pripravuje<a href="https://mrazosoft.sk" target="_blank" rel="noopener">MRAZO<span class="grad-text">SOFT</span><span class="arr">→</span></a></p>
  </main>
</body>
</html>
